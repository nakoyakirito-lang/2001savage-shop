<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900;1,900&family=Noto+Sans+Lao:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #ffffff; color: #111; max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 110px !important; font-family: 'Noto Sans Lao', 'Montserrat', sans-serif !important; }
    .material-icons-outlined { font-family: 'Material Icons Outlined' !important; }
    a { text-decoration: none; color: inherit; }
    
    /* --- Header (ย่อขนาด) --- */
    .header { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px !important; background: white; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #f0f0f0; }
    .header .title { font-size: 0.85rem !important; font-family: 'Montserrat', sans-serif; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
    .icon-btn { background: none; border: none; cursor: pointer; color: #111; display: flex; align-items: center; }
    .icon-btn .material-icons-outlined { font-size: 20px !important; }
    
    /* --- Navigation Bar --- */
    .navigation-bar { display: flex; align-items: center; padding: 0 15px 8px; background: white; margin-bottom: 5px; }
    .breadcrumbs { display: flex; align-items: center; font-size: 0.65rem; color: #ccc; font-family: 'Montserrat', sans-serif; font-weight: 600; text-transform: uppercase; }
    .breadcrumbs .home-link { text-decoration: none; color: #999; transition: color 0.2s; }
    .breadcrumbs .model-name { color: #111; font-weight: 800; }
    
    /* --- Hero Section (ชื่อและรูปสินค้า) --- */
    .hero { padding: 15px 15px 0; }
    .hero .title { font-size: 1.2rem; font-weight: 800; line-height: 1.2; margin-bottom: 6px; }
    .sku-line { font-family: 'Montserrat', sans-serif; font-size: 0.65rem; color: #666; font-weight: 700; margin-bottom: 12px; text-transform: uppercase; }
    
    .main-image { position: relative; background: #f8f8f8; width: 100%; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; padding: 10px; border: 1px solid #f0f0f0; border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
    .main-image img { max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.3s ease; }
    
    .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.9); border: 1px solid #eee; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; color: #111; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: background 0.2s; }
    .nav-arrow:active { background: #f0f0f0; }
    .nav-arrow.left { left: 8px; }
    .nav-arrow.right { right: 8px; }

    /* --- ตัวเลือกย่อย (Variants) --- */
    .variant-label { font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: 700; margin-top: 10px; color:#111;}
    .thumbnail-scroll { display: flex; gap: 8px; margin-top: 8px; margin-bottom: 15px; overflow-x: auto; scrollbar-width: none; padding-bottom:5px; scroll-behavior: smooth; }
    .thumbnail { width: 55px; height: 55px; min-width: 55px; border: 2px solid #eee; border-radius: 8px; padding: 4px; cursor: pointer; background: #fff; transition: border-color 0.3s;}
    .thumbnail.active { border-color: #111; }
    .thumbnail img { width: 100%; height: 100%; object-fit: contain; }

    /* --- ข้อมูลราคาและรายละเอียด --- */
    .info { padding: 10px 15px 0; border-bottom: 1px solid #f0f0f0; }
    .status-badge { display: inline-block; color: white; font-family: 'Montserrat', sans-serif; font-size: 0.55rem; font-weight: 800; padding: 4px 8px; border-radius: 15px; letter-spacing: 0.5px; margin-bottom: 8px; }
    .in-stock { background: #00e676; } 
    .out-stock { background: #ff3d00; } 
    .info .price { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; font-weight: 900; color: #111; margin-bottom: 15px; }
    .info-details { margin-bottom: 15px; }
    .info-row { display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding: 6px 0; font-size: 0.75rem; }
    .info-label { color: #666; font-weight: 600; }
    .info-value { font-weight: 700; color: #111; text-align: right; }
    
    /* 🌟 Action Bar (ปุ่มสั่งซื้อ) */
    .action-bar { position: fixed; bottom: 50px !important; width: 100%; max-width: 500px; background: white; padding: 10px 15px 12px; border-top: 1px solid #eee; z-index: 100; display: flex; gap: 8px; }
    .btn-buy { display: flex; align-items: center; justify-content: center; gap: 4px; border-radius: 20px; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 0.75rem; letter-spacing: 0.5px; text-transform: uppercase; border: none; cursor: pointer; transition: 0.2s; flex: 1; padding: 12px 0;}
    .btn-buy:active { transform: scale(0.95); }
    .btn-buy .material-icons-outlined { font-size: 16px !important; }
    .btn-disabled { background: #ccc !important; color: #666 !important; border-color: #ccc !important; pointer-events: none; }
    
    .review-section { padding: 15px 15px 0; margin-bottom: 15px; display: none; }
    .review-title { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 900; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; color: #111; border-left: 4px solid #111; padding-left: 8px;}
    .review-img { width: 100%; border-radius: 8px; margin-bottom: 10px; border: 1px solid #f0f0f0; object-fit: contain; background: #f8f8f8; }
    
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    
    /* --- Bottom Nav (แบ่ง 3 ส่วน) --- */
    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-between; border-top: 1px solid #eee; z-index: 99; padding: 0; }
    .nav-link { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #999; font-family: 'Montserrat', sans-serif; font-size: 0.5rem !important; font-weight: 700; letter-spacing: 0.5px; gap: 2px; width: 33.33%; padding: 8px 0; text-decoration: none; position: relative; }
    .nav-link.active { background: #111; color: white; } 
    .nav-link.active .material-icons-outlined { color: white; }
    .nav-icon-box { background: transparent; position: relative; }
    .nav-link .material-icons-outlined { font-size: 20px !important; }
  </style>
</head>
<body>

  <header class="header">
    <a href="index.html" class="icon-btn">
      <span class="material-icons-outlined">arrow_back</span>
    </a>
    <div class="title">SAVAGE SHOP</div>
    
    <button class="icon-btn" style="position: relative;" onclick="window.location.href='cart.html'">
      <span class="material-icons-outlined">shopping_cart</span>
      <span id="cart-badge" style="display:none; position:absolute; top:-4px; right:-4px; background:#ff3d00; color:white; border-radius:50%; font-size:9px; font-weight:bold; width: 16px; height: 16px; line-height: 16px; text-align: center;">0</span>
    </button>
  </header>
  
  <div class="navigation-bar">
    <div class="breadcrumbs">
      <a href="index.html" class="home-link">HOME</a>
      <span class="material-icons-outlined" style="font-size:10px; margin: 0 4px;">chevron_right</span>
      <span class="model-name">DETAIL</span>
    </div>
  </div>
  
  <div class="hero">
    <div class="title" id="display-name">ກຳລັງໂຫຼດ...</div>
    <div class="sku-line" id="display-sku">SKU: -</div>
    
    <div class="image-gallery">
      <div class="main-image">
        <!-- Arrows added dynamically in script -->
        <img id="main-img" src="https://via.placeholder.com/400?text=No+Image" onerror="this.src='https://via.placeholder.com/400?text=No+Image'">
      </div>
    </div>

    <div class="variant-label" style="display:none;">CHOOSE VARIANT / ເລືອກສີ ຫຼື ແບບ:</div>
    <div class="thumbnail-scroll" id="thumb-scroll" style="display:none;"></div>
  </div>
  
  <div class="info">
    <div id="display-stock" class="status-badge in-stock">
      LOADING...
    </div>
    
    <div class="price" id="display-price">0 ₭</div>
    
    <div class="info-details">
      <div class="info-row">
        <span class="info-label">COMPATIBILITY</span>
        <span class="info-value">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">CATEGORY</span>
        <span class="info-value">-</span>
      </div>
    </div>
  </div>

  <div class="review-section" id="review-section">
    <div class="review-title">GALLERY & REVIEWS</div>
    <div id="review-images-container"></div>
  </div>
  
  <div class="action-bar">
    <button id="btn-add-cart" class="btn-buy" style="background: #fff; color: #111; border: 1px solid #111;">
      <span class="material-icons-outlined">add_shopping_cart</span>
      ເພີ່ມລົງກະຕ່າ
    </button>
    <button id="btn-buy-now" class="btn-buy" style="background: #ff3d00; color: #fff; border: 1px solid #ff3d00;">
      ชື້ເລີຍ
    </button>
  </div>

  <div id="cart-modal" style="display:none; position:fixed; bottom:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; align-items:flex-end;">
    <div style="background:white; width:100%; max-width:500px; padding:15px; border-radius:16px 16px 0 0; animation: slideUp 0.3s ease; max-height:85vh; display:flex; flex-direction:column; margin: 0 auto;">
      
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <div style="font-weight:900; font-family:'Montserrat'; font-size:0.85rem; text-transform:uppercase;">ເລືອກຈຳນວນສິນຄ້າ</div>
        <button onclick="closeModal()" style="background:none; border:none; cursor:pointer; color:#999;"><span class="material-icons-outlined" style="font-size:20px;">close</span></button>
      </div>

      <div id="modal-variants-list" style="overflow-y:auto; margin-bottom:10px; padding-right:5px; flex-grow:1;"></div>

      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding-top:10px; border-top:1px solid #eee;">
        <div style="font-weight:800; font-family:'Montserrat'; font-size:0.9rem;">TOTAL:</div>
        <div id="modal-total-price" style="font-family:'Montserrat'; font-weight:900; font-size:1.2rem; color:#ff3d00;">0 ₭</div>
      </div>

      <button id="modal-confirm-btn" class="btn-buy" onclick="confirmAddToCart()" style="border:none; cursor:pointer; width:100%;">ຢືນຢັນ</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="index.html" class="nav-link">
      <div class="nav-icon-box"><span class="material-icons-outlined">home</span></div><span>HOME</span>
    </a>
    <a href="orders.html" class="nav-link">
      <div class="nav-icon-box" style="position: relative; display: inline-block;">
        <span class="material-icons-outlined">receipt_long</span>
        <span id="nav-cart-badge" style="display:none; position:absolute; top:-4px; right:-8px; background:#ff3d00; color:white; border-radius:50%; font-size:9px; font-weight:bold; min-width: 16px; height: 16px; line-height: 16px; text-align: center; padding: 0 4px; z-index: 10;">0</span>
      </div>
      <span>ORDERS</span>
    </a>
    <a href="profile.html" class="nav-link">
      <div class="nav-icon-box"><span class="material-icons-outlined">person</span></div><span>PROFILE</span>
    </a>
  </nav>

  <script type="module" src="detail_script.js"></script>
</body>
</html>
